services:
  alhc-reward:
    build:
      context: ./alhc-reward
      args:
        VITE_API_URL: ${ALHC_VITE_API_URL:-http://localhost:5000}
    ports:
      - "4200:80"
    depends_on:
      - backend
    restart: always

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ${WEB_VITE_API_URL:-http://localhost:5000}
    ports:
      - "4201:80"
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      PORT: "5000"
      DATABASE_URL: "postgresql://postgres:123456@db:5432/loyalty"
      JWT_ACCESS_SECRET: "coffee-access-secret-change-me"
      JWT_REFRESH_SECRET: "coffee-refresh-secret-change-me"
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "7d"
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: ${POSTGRES_DB:-loyalty}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-loyalty}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
